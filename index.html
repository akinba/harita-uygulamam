<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerçek Mesafe ve Koordinat Hesaplama</title>
    
    <!-- MapLibre GL CSS -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" />
    
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Kendi Style Dosyamız -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Harita Konteyneri -->
    <div id="map"></div>

    <!-- UI/Panel Alanı -->
    <div class="control-panel glass-panel">
        <h1 class="panel-title">Mesafe Ölçüm</h1>
        
        <div class="form-group">
            <label for="crsSelect">Koordinat Sistemi Seçimi</label>
            <select id="crsSelect">
                <!-- Seçenekler js dosyasında eklenecek veya direk burada da tanımlanabilir -->
                <option value="EPSG:4326">WGS84 (EPSG:4326 - Enlem/Boylam)</option>
                <option value="EPSG:3857">Web Mercator (EPSG:3857 - Metre)</option>
                <!-- Türkiye için sık kullanılan bir UTM örneği -->
                <option value="EPSG:32635">UTM Zone 35N (EPSG:32635 - Metre)</option>
                <option value="EPSG:32636">UTM Zone 36N (EPSG:32636 - Metre)</option>
                <option value="EPSG:32637">UTM Zone 37N (EPSG:32637 - Metre)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="intervalSelect">Ölçüm Aralığı (Metre)</label>
            <select id="intervalSelect">
                <option value="1">1 Metre</option>
                <option value="5" selected>5 Metre</option>
                <option value="10">10 Metre</option>
                <option value="50">50 Metre</option>
                <option value="100">100 Metre</option>
            </select>
        </div>

        <div class="info-box">
            <div class="point-info">
                <strong>📍 1. Nokta:</strong>
                <span id="point1-coords" class="coords">-</span>
            </div>
            
            <div class="point-info">
                <strong>📍 2. Nokta:</strong>
                <span id="point2-coords" class="coords">-</span>
            </div>
        </div>

        <div class="result-box">
            <div class="distance-label">Ölçülen Mesafe:</div>
            <div id="distance-result" class="distance-value">0.00 km</div>
        </div>

        <button id="resetBtn" class="primary-btn">Sıfırla</button>
        <p class="help-text">Harita üzerinde tıklayarak 2 nokta seçiniz.</p>
    </div>

    <!-- Alt Çizgi Grafiği Paneli -->
    <div id="bottom-panel" class="bottom-panel glass-panel hidden">
        <div class="panel-header">
            <h3>Arazi Kesit Grafiği</h3>
            <button id="closeChartBtn" class="close-btn">&times;</button>
        </div>
        <div class="chart-container">
            <canvas id="elevationChart"></canvas>
        </div>
    </div>

    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
    
    <!-- Turf.js (Geometrik hesaplamalar için) -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
    
    <!-- Chart.js (Grafik çizimi için) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Proj4js (Koordinat Dönüşümleri) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    
    <!-- Kendi JS dosyamız -->
    <script src="script.js"></script>

</body>
</html>
